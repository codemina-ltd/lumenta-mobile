name: mobile
description: "Lumenta mobile companion app."
publish_to: 'none'

version: 1.0.0+9

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing (deep links for notification taps)
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Secure token storage (Keychain / Keystore). 10.x adds Swift Package
  # Manager support via flutter_secure_storage_darwin.
  flutter_secure_storage: ^10.0.0

  # Firebase / FCM
  # 16.x hardened APNs-token handling for the new iOS UIScene lifecycle; needs
  # firebase_core 4.x. (15.x relied on AppDelegate-proxy swizzling that could
  # miss the APNs token under the scene-based embedding, leaving it null.)
  firebase_core: ^4.2.0
  firebase_messaging: ^16.0.3
  # 19+ ships a Package.swift (Swift Package Manager support).
  flutter_local_notifications: ^19.0.0

  # reCAPTCHA Enterprise (mobile login token)
  recaptcha_enterprise_flutter: ^18.7.0

  # Fonts (Inter Tight + JetBrains Mono, fetched & cached at runtime)
  google_fonts: ^6.2.1

  # i18n
  intl: any

  # Media
  cached_network_image: ^3.4.1
  audioplayers: ^6.1.0

  # Reply composer attachments (Phase 7)
  image_picker: ^1.1.2
  file_picker: ^8.1.6

  # NOTE: permission_handler intentionally NOT used — FirebaseMessaging and
  # image_picker request their own permissions. Its iOS pod compiles all
  # permission modules (incl. CoreLocation), which triggers App Store
  # ITMS-90683 (missing NSLocationWhenInUseUsageDescription) even when unused.

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  generate: true
  config:
    enable-lldb-debugging: false

  assets:
    # Notification event strings (en/ar/fr), mirrored from the portal's
    # `notifications` i18n namespace. Title/body keys are server-provided.
    - assets/i18n/notifications/
    - assets/images/
